<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RMCF — Business Registry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset & Theme Variables ────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:   #0D1B2A; --ink:    #1A2E45; --blue:   #1B4F8A;
  --mid:    #2563A8; --accent: #3B82C4; --steel:  #5B8DB8;
  --fog:    #A8C4DD; --paper:  #EDF4FB; --white:  #F7FAFD;
  --text-primary: #EDF4FB; --text-secondary: #8AACCA; --text-muted: #5B8DB8;
  --border: rgba(91,141,184,0.25); --border-hi: rgba(91,141,184,0.5);
  --mono: 'IBM Plex Mono', monospace; --sans: 'Inter', sans-serif;
  --r: 4px; --gap: 16px;
}
html, body {
  height: 100%; background: var(--navy); color: var(--text-primary);
  font-family: var(--sans); font-size: 14px; line-height: 1.55;
  -webkit-font-smoothing: antialiased; overscroll-behavior: none;
}
#app { max-width: 480px; min-height: 100vh; margin: 0 auto; display: flex; flex-direction: column; position: relative; }
.screen { display: none; flex: 1; flex-direction: column; animation: fadeIn 0.18s ease; }
.screen.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ── Typography & Forms ─────────────────────────────────────── */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px var(--gap) 12px; border-bottom: 1px solid var(--border); background: var(--ink); position: sticky; top: 0; z-index: 10; }
.logo-mark { display: flex; align-items: baseline; gap: 8px; }
.logo-text { font-family: var(--mono); font-size: 17px; font-weight: 500; letter-spacing: 0.06em; color: var(--white); }
.logo-tag { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; color: var(--text-muted); text-transform: uppercase; }
.scroll-body { flex: 1; overflow-y: auto; padding: var(--gap); -webkit-overflow-scrolling: touch; }
.form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
input, select, textarea { background: var(--ink); border: 1px solid var(--border); border-radius: var(--r); color: var(--text-primary); font-family: var(--sans); font-size: 14px; padding: 10px 12px; outline: none; width: 100%; }
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
.form-hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* ── UI Elements ────────────────────────────────────────────── */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border: 1px solid transparent; border-radius: var(--r); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.14s; text-decoration: none; white-space: nowrap; }
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--blue); border-color: var(--mid); color: var(--white); }
.btn-primary:hover { background: var(--mid); }
.btn-secondary { background: transparent; border-color: var(--border-hi); color: var(--fog); }
.btn-secondary:hover { border-color: var(--steel); color: var(--white); }
.btn-danger { background: transparent; border-color: rgba(220,60,60,0.4); color: #e07070; }
.btn-danger:hover { background: rgba(220,60,60,0.12); }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text-secondary); padding: 6px; }
.btn-full { width: 100%; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

.auth-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--ink); }
.auth-tab { flex: 1; padding: 14px; text-align: center; font-size: 13px; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; }
.auth-tab.active { color: var(--white); border-bottom-color: var(--accent); background: rgba(255,255,255,0.02); }
.auth-panel { display: none; padding: 20px 4px 10px; }
.auth-panel.active { display: block; }

.company-card { background: var(--ink); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; margin-bottom: 12px; }
.company-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.company-shortname { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; color: var(--accent); background: rgba(59,130,196,0.12); padding: 2px 7px; border: 1px solid rgba(59,130,196,0.3); }
.company-name { font-size: 15px; font-weight: 600; color: var(--white); }
.company-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; margin-top: 10px; margin-bottom: 10px; }
.company-meta-item { color: var(--text-secondary); }
.company-meta-item strong { color: var(--text-primary); display: block; font-size: 11px; margin-bottom: 1px; }
.company-actions { display: flex; gap: 6px; padding-top: 10px; border-top: 1px solid var(--border); margin-top: 6px; }

/* ── Modals & Toast ─────────────────────────────────────────── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(13,27,42,0.85); z-index: 100; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--ink); border: 1px solid var(--border); border-radius: 6px 6px 0 0; width: 100%; max-width: 480px; max-height: 90vh; display: flex; flex-direction: column; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); }
.modal-body { flex: 1; overflow-y: auto; padding: 16px; }
.modal-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
.modal-close { background: none; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; }

#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--ink); border: 1px solid var(--border-hi); color: var(--text-primary); padding: 10px 20px; border-radius: var(--r); font-size: 13px; z-index: 999; transition: transform 0.2s ease; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.error { border-color: #e07070; color: #e07070; }
#toast.success { border-color: #5ab87a; color: #5ab87a; }
.spinner { width: 18px; height: 18px; border: 2px solid rgba(91,141,184,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-center { display: flex; align-items: center; justify-content: center; padding: 30px; }
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.multi-input-row { display: flex; gap: 6px; margin-bottom: 6px; }
.bottom-nav { display: flex; border-top: 1px solid var(--border); background: var(--ink); }
.nav-tab { flex: 1; padding: 14px 8px; text-align: center; font-size: 11px; font-family: var(--mono); color: var(--text-muted); cursor: pointer; text-transform: uppercase; }
.nav-tab.active { color: var(--accent); background: rgba(255,255,255,0.02); font-weight: 600; }
.tag-container { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; background: var(--navy); border: 1px solid var(--border); border-radius: var(--r); min-height: 38px; align-items: center; }
.v-tag { display: inline-flex; align-items: center; gap: 4px; background: rgba(59,130,196,0.18); border: 1px solid rgba(59,130,196,0.4); padding: 2px 6px; font-size: 12px; font-family: var(--mono); border-radius: 2px; }
.v-tag-remove { cursor: pointer; color: #e07070; font-weight: bold; }
.landing-hero { padding: 40px var(--gap) 20px; text-align: center; }
.landing-logo-box { width: 56px; height: 56px; background: var(--blue); border: 2px solid var(--mid); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-family: var(--mono); font-size: 18px; color: var(--white); font-weight: bold; }
</style>
</head>
<body>
<div id="app">

  <div id="screen-auth" class="screen active">
    <div class="landing-hero">
      <div class="landing-logo-box">RMCF</div>
      <h2 style="font-size:22px; margin-bottom:4px; color:var(--white);">Business Registry</h2>
      <p style="font-size:11px; font-family:var(--mono); color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em;">RMC en Franzengueric</p>
    </div>
    <div class="auth-tabs">
      <div id="tab-login" class="auth-tab active" onclick="switchAuthTab('login')">Sign In</div>
      <div id="tab-register" class="auth-tab" onclick="switchAuthTab('register')">Create Account</div>
    </div>
    <div class="scroll-body">
      <div id="panel-login" class="auth-panel active">
        <div class="form-group">
          <label>Username</label>
          <input id="l-user" type="text" placeholder="Enter your username" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div style="height:10px"></div>
        <button class="btn btn-primary btn-full" onclick="submitLogin()">Sign In to Registry</button>
        <div style="height:20px"></div>
        <button class="btn btn-secondary btn-full" onclick="switchToAdmin()">Access Administrative Console</button>
      </div>
      <div id="panel-register" class="auth-panel">
        <div class="form-group">
          <label>Desired Username</label>
          <input id="r-user" type="text" placeholder="e.g. janesmith" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Security Password</label>
          <input id="r-pass" type="password" placeholder="Choose a safe password" autocomplete="new-password">
        </div>
        <div class="divider"></div>
        <div class="form-group">
          <label>Legal First Name</label>
          <input id="r-fn" type="text" placeholder="In-game character first name">
        </div>
        <div class="form-group">
          <label>Legal Last Name</label>
          <input id="r-ln" type="text" placeholder="In-game character last name">
        </div>
        <div class="form-group">
          <label>Patronymic Middle Name <span style="text-transform:none; font-weight:400; color:var(--text-muted)">(Optional)</span></label>
          <input id="r-pat" type="text" placeholder="In-game character middle name">
        </div>
        <div style="height:10px"></div>
        <button class="btn btn-primary btn-full" onclick="submitRegister()">Create Registry Profile</button>
      </div>
    </div>
  </div>

  <div id="screen-dashboard" class="screen">
    <div class="topbar">
      <div class="logo-mark"><div class="logo-text">RMCF</div><div class="logo-tag">Registry</div></div>
      <div><button class="btn btn-ghost btn-sm" onclick="logoutUser()" style="font-family:var(--mono); font-size:11px;">[ LOGOUT ]</button></div>
    </div>
    <div class="scroll-body">
      <div style="margin-bottom: 16px;">
        <h3 id="dash-welcome-title" style="font-size:18px; color:var(--white);">Welcome</h3>
        <p id="dash-welcome-sub" style="font-family:var(--mono); font-size:12px; color:var(--text-muted);"></p>
      </div>
      <div class="divider"></div>
      <div style="display:flex; justify-content:between; align-items:center; margin-bottom:12px;">
        <span style="font-family:var(--mono); font-size:11px; text-transform:uppercase; color:var(--text-muted); letter-spacing:0.05em;">Your Registered Entities</span>
      </div>
      <div id="my-companies-list"><div class="loading-center"><div class="spinner"></div></div></div>
      <div style="height:14px"></div>
      <button class="btn btn-primary btn-full" onclick="openCreateModal()">+ Register New Corporate Entity</button>
      <div class="divider"></div>
      <span style="font-family:var(--mono); font-size:11px; text-transform:uppercase; color:var(--text-muted); letter-spacing:0.05em; display:block; margin-bottom:12px;">Public Corporate Archive (Active Companies)</span>
      <div id="public-companies-list"><div class="loading-center"><div class="spinner"></div></div></div>
    </div>
  </div>

  <div id="screen-admin" class="screen">
    <div class="topbar">
      <div class="logo-mark"><div class="logo-text">RMCF</div><div class="logo-tag">Admin</div></div>
      <div><button class="btn btn-secondary btn-sm" onclick="exitAdmin()">Exit Admin</button></div>
    </div>
    <div class="auth-tabs" style="border-bottom: 1px solid var(--border);">
      <div id="adm-tab-comp" class="auth-tab active" onclick="switchAdminTab('comp')">Companies</div>
      <div id="adm-tab-users" class="auth-tab" onclick="switchAdminTab('users')">Users</div>
    </div>
    <div class="scroll-body">
      <div id="adm-panel-comp" class="admin-view-panel">
        <div id="admin-companies-container"><div class="loading-center"><div class="spinner"></div></div></div>
      </div>
      <div id="adm-panel-users" class="admin-view-panel" style="display:none;">
        <div id="admin-users-container"><div class="loading-center"><div class="spinner"></div></div></div>
      </div>
    </div>
  </div>

  <div id="modal-company" class="modal-overlay" onclick="handleOutsideModalClick(event, 'modal-company')">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-company-title" class="modal-title">Register Company</h3>
        <button class="modal-close" onclick="closeModal('modal-company')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="c-edit-id">
        <div class="form-group">
          <label>Original Business Name</label>
          <input id="c-nameOriginal" type="text" placeholder="e.g. Горная Добыча">
        </div>
        <div class="form-group">
          <label>Latin Legal Name</label>
          <input id="c-nameLatin" type="text" placeholder="e.g. Gornaya Dobycha">
        </div>
        <div class="form-group" id="c-shortcode-group">
          <label>Short Identifier Code (3-4 Letters)</label>
          <input id="c-nameShort" type="text" placeholder="e.g. GDC" maxlength="4">
          <div class="form-hint">Unique business lookup token. Cannot be changed once filed.</div>
        </div>
        <div class="form-group">
          <label>Registered Legal Headquarters Address</label>
          <input id="c-addressReg" type="text" placeholder="Official legal registration line">
        </div>
        <div class="form-group">
          <label>Physical Address / Asset Locations</label>
          <div id="physical-addresses-wrapper">
            <div class="multi-input-row">
              <input type="text" class="phys-addr-input" placeholder="Physical site location line">
              <button class="btn btn-secondary" style="padding:10px" onclick="addPhysicalAddressRow('')">+</button>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Starting Working Capital (€)</label>
          <input id="c-capital" type="number" min="100" value="100">
        </div>
        <div class="form-group">
          <label>Field / Industry Classification</label>
          <select id="c-sphere">
            <option>Mining & Resources</option>
            <option>Trade & Commerce</option>
            <option>Construction</option>
            <option>Agriculture</option>
            <option>Manufacturing</option>
            <option>Logistics & Transport</option>
            <option>Banking & Finance</option>
            <option>Hospitality</option>
            <option>Other Services</option>
          </select>
        </div>
        <div class="form-group">
          <label>Staff Employees</label>
          <div class="tag-container" id="staff-container">
            <input id="staff-tag-input" type="text" placeholder="Add staff handle and press Enter" style="border:none; padding:4px; background:transparent; flex:1;" onkeydown="handleStaffTagInput(event)">
          </div>
        </div>
        <div class="form-group">
          <label>Operational Licensing Clearances</label>
          <div style="display:flex; flex-direction:column; gap:6px; padding:4px 0;">
            <label style="display:flex; align-items:center; gap:8px; color:var(--text-primary); text-transform:none; font-size:13px; font-weight:400; cursor:pointer;"><input type="checkbox" name="license" value="Alcohol Logistics"> Alcohol Logistics</label>
            <label style="display:flex; align-items:center; gap:8px; color:var(--text-primary); text-transform:none; font-size:13px; font-weight:400; cursor:pointer;"><input type="checkbox" name="license" value="Financial Clearing"> Financial Clearing Ledger License</label>
            <label style="display:flex; align-items:center; gap:8px; color:var(--text-primary); text-transform:none; font-size:13px; font-weight:400; cursor:pointer;"><input type="checkbox" name="license" value="Heavy Industrial Extraction"> Heavy Industrial Extraction Permit</label>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" style="flex:1;" onclick="closeModal('modal-company')">Cancel</button>
        <button class="btn btn-primary" id="btn-submit-company" style="flex:1;" onclick="saveCompanyAction()">File Record</button>
      </div>
    </div>
  </div>

  <div id="toast">Message Container</div>
</div>

<script>
// ── CONFIGURATION LINK ───────────────────────────────────────
const API_URL = 'https://script.google.com/macros/s/AKfycbzbWxpXPp0vQ4P7InsF1e37-xBdjy5FbPHCTp1T39emCiOzFRSobI2Eo-NONucT8n1yyg/exec'; // ← Replace with deployment URL

let currentUser = JSON.parse(localStorage.getItem('rmcf_user_session')) || null;
let currentStaffTags = [];
let adminPasswordState = '';

window.addEventListener('DOMContentLoaded', () => {
  if (currentUser) { navigateTo('screen-dashboard'); loadDashboardData(); }
});

// ── CORE COMMUNICATIONS CLIENT ENGINE ────────────────────────
async function apiCall(payload) {
  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      mode: 'cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    const result = await response.json();
    if (!result.ok) throw new Error(result.error || 'Server processed an error handling the request');
    return result.data;
  } catch (err) {
    showToast(err.message, 'error');
    throw err;
  }
}

// ── SCREEN NAVIGATION CONTROL ────────────────────────────────
function navigateTo(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
}

function switchAuthTab(type) {
  document.getElementById('tab-login').classList.toggle('active', type === 'login');
  document.getElementById('tab-register').classList.toggle('active', type === 'register');
  document.getElementById('panel-login').classList.toggle('active', type === 'login');
  document.getElementById('panel-register').classList.toggle('active', type === 'register');
}

// ── CLIENT SYSTEM RUNTIME LOGIC ──────────────────────────────
async function submitRegister() {
  const username = document.getElementById('r-user').value.trim();
  const password = document.getElementById('r-pass').value.trim();
  const firstName = document.getElementById('r-fn').value.trim();
  const lastName = document.getElementById('r-ln').value.trim();
  const patronymic = document.getElementById('r-pat').value.trim();

  if(!username || !password || !firstName || !lastName) {
    return showToast('Please fulfill all critical user credentials files', 'error');
  }

  const data = await apiCall({ action: 'register', username, password, firstName, lastName, patronymic });
  if (data) {
    showToast('Registry identification created! Logging in...', 'success');
    currentUser = data;
    localStorage.setItem('rmcf_user_session', JSON.stringify(data));
    navigateTo('screen-dashboard');
    loadDashboardData();
  }
}

async function submitLogin() {
  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value.trim();
  if(!username || !password) return showToast('Input username and security key values', 'error');

  const data = await apiCall({ action: 'login', username, password });
  if (data) {
    showToast('Access clear.', 'success');
    currentUser = data;
    localStorage.setItem('rmcf_user_session', JSON.stringify(data));
    navigateTo('screen-dashboard');
    loadDashboardData();
  }
}

function logoutUser() {
  localStorage.removeItem('rmcf_user_session');
  currentUser = null;
  document.getElementById('l-pass').value = '';
  switchAuthTab('login');
  navigateTo('screen-auth');
}

// ── BUSINESS OVERVIEW VIEWPORTS ──────────────────────────────
async function loadDashboardData() {
  if (!currentUser) return;
  document.getElementById('dash-welcome-title').textContent = `Welcome, ${currentUser.firstName} ${currentUser.lastName}`;
  document.getElementById('dash-welcome-sub').textContent = `@${currentUser.username}`;

  renderMyCompanies();
  renderPublicCompanies();
}

async function renderMyCompanies() {
  const container = document.getElementById('my-companies-list');
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
  try {
    const data = await apiCall({ action: 'getMyCompanies', userId: currentUser.id });
    if(data.length === 0) {
      container.innerHTML = '<p style="font-size:12px; color:var(--text-muted); text-align:center; padding:16px;">No active corporate business entities associated with this account record profile.</p>';
      return;
    }
    container.innerHTML = data.map(c => renderCompanyCardMarkup(c, true)).join('');
  } catch(e) { container.innerHTML = ''; }
}

async function renderPublicCompanies() {
  const container = document.getElementById('public-companies-list');
  try {
    const data = await apiCall({ action: 'getAllCompanies' });
    if(data.length === 0) {
      container.innerHTML = '<p style="font-size:12px; color:var(--text-muted); text-align:center; padding:16px;">Registry public ledger archive currently contains no records.</p>';
      return;
    }
    container.innerHTML = data.map(c => renderCompanyCardMarkup(c, false)).join('');
  } catch(e) { container.innerHTML = ''; }
}

function renderCompanyCardMarkup(c, isOwner) {
  const isInactive = c.status === 'inactive';
  return `
    <div class="company-card" style="${isInactive ? 'opacity: 0.5;' : ''}">
      <div class="company-card-header">
        <div>
          <h4 class="company-name">${escapeHtml(c.nameOriginal || c.nameLatin)}</h4>
          <p style="font-size:12px; color:var(--text-secondary); font-family:var(--mono);">${escapeHtml(c.nameLatin)}</p>
        </div>
        <span class="company-shortname">${escapeHtml(c.nameShort)}</span>
      </div>
      <div class="company-meta">
        <div class="company-meta-item"><strong>Headquarters</strong>${escapeHtml(c.addressReg || 'None Listed')}</div>
        <div class="company-meta-item"><strong>Working Capital</strong>€${Number(c.capital).toLocaleString()}</div>
        <div class="company-meta-item"><strong>Industry</strong>${escapeHtml(c.sphere)}</div>
        <div class="company-meta-item"><strong>Registry Filer Account</strong>@${escapeHtml(c.ownerUsername)}</div>
      </div>
      ${c.addressPhysical ? `<div style="font-size:12px; margin-bottom:8px; color:var(--text-secondary);"><strong>Assets Location Focus:</strong> ${escapeHtml(c.addressPhysical)}</div>` : ''}
      ${c.staff ? `<div style="font-size:11px; margin-bottom:8px; color:var(--text-muted); font-family:var(--mono);">Staff Members: ${escapeHtml(c.staff)}</div>` : ''}
      ${c.licenses ? `<div style="font-size:11px; color:#5ab87a; font-family:var(--mono);">Licenses: ${escapeHtml(c.licenses)}</div>` : ''}
      
      ${isOwner && !isInactive ? `
        <div class="company-actions">
          <button class="btn btn-secondary btn-sm" onclick='openEditModal(${JSON.stringify(c)})'>Modify Profile Parameters</button>
          <button class="btn btn-danger btn-sm" onclick="deactivateCompanyRecord('${c.id}')">Deactivate Registration File</button>
        </div>
      ` : ''}
    </div>
  `;
}

// ── CREATION & ALTERATION MODAL LOGIC ──────────────────────────
function openCreateModal() {
  document.getElementById('modal-company-title').textContent = 'Register Company';
  document.getElementById('c-edit-id').value = '';
  document.getElementById('c-nameShort').value = '';
  document.getElementById('c-shortcode-group').style.display = 'block';
  
  document.getElementById('c-nameOriginal').value = '';
  document.getElementById('c-nameLatin').value = '';
  document.getElementById('c-addressReg').value = '';
  document.getElementById('c-capital').value = '100';
  document.getElementById('c-sphere').selectedIndex = 0;
  
  document.getElementById('physical-addresses-wrapper').innerHTML = `
    <div class="multi-input-row">
      <input type="text" class="phys-addr-input" placeholder="Physical site location line">
      <button class="btn btn-secondary" style="padding:10px" onclick="addPhysicalAddressRow('')">+</button>
    </div>
  `;
  currentStaffTags = [];
  rebuildStaffTagsUi();
  document.querySelectorAll('input[name="license"]').forEach(ch => ch.checked = false);
  
  openModal('modal-company');
}

function openEditModal(c) {
  document.getElementById('modal-company-title').textContent = `Amend ${c.nameShort} File`;
  document.getElementById('c-edit-id').value = c.id;
  document.getElementById('c-nameShort').value = c.nameShort;
  document.getElementById('c-shortcode-group').style.display = 'none';
  
  document.getElementById('c-nameOriginal').value = c.nameOriginal;
  document.getElementById('c-nameLatin').value = c.nameLatin;
  document.getElementById('c-addressReg').value = c.addressReg;
  document.getElementById('c-capital').value = c.capital;
  document.getElementById('c-sphere').value = c.sphere;

  const physicalContainer = document.getElementById('physical-addresses-wrapper');
  physicalContainer.innerHTML = '';
  const paths = (c.addressPhysical || '').split(';').map(p => p.trim()).filter(p => p);
  if(paths.length === 0) paths.push('');
  paths.forEach(p => addPhysicalAddressRow(p));

  currentStaffTags = (c.staff || '').split(',').map(s => s.trim()).filter(s => s);
  rebuildStaffTagsUi();

  const activeLicenses = (c.licenses || '').split(',').map(l => l.trim());
  document.querySelectorAll('input[name="license"]').forEach(ch => {
    ch.checked = activeLicenses.includes(ch.value);
  });

  openModal('modal-company');
}

function addPhysicalAddressRow(value = '') {
  const row = document.createElement('div');
  row.className = 'multi-input-row';
  row.innerHTML = `
    <input type="text" class="phys-addr-input" value="${escapeHtml(value)}" placeholder="Physical site location line">
    <button class="btn btn-ghost" style="color:#e07070;" onclick="this.parentElement.remove()">✕</button>
  `;
  document.getElementById('physical-addresses-wrapper').appendChild(row);
}

function handleStaffTagInput(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    let val = e.target.value.trim().replace(/^@/, '');
    if(val && !currentStaffTags.includes(val)) {
      currentStaffTags.push(val);
      rebuildStaffTagsUi();
    }
    e.target.value = '';
  }
}

function rebuildStaffTagsUi() {
  const input = document.getElementById('staff-tag-input');
  document.querySelectorAll('.v-tag').forEach(t => t.remove());
  currentStaffTags.forEach(tag => {
    const span = document.createElement('span');
    span.className = 'v-tag';
    span.innerHTML = `@${escapeHtml(tag)} <span class="v-tag-remove" onclick="removeStaffTag('${tag}')">×</span>`;
    document.getElementById('staff-container').insertBefore(span, input);
  });
}

function removeStaffTag(tag) {
  currentStaffTags = currentStaffTags.filter(t => t !== tag);
  rebuildStaffTagsUi();
}

async function saveCompanyAction() {
  const compId = document.getElementById('c-edit-id').value;
  const originalName = document.getElementById('c-nameOriginal').value.trim();
  const latinName = document.getElementById('c-nameLatin').value.trim();
  const shortCode = document.getElementById('c-nameShort').value.trim();
  const regAddress = document.getElementById('c-addressReg').value.trim();
  const capitalVal = document.getElementById('c-capital').value;
  const industrySphere = document.getElementById('c-sphere').value;

  const physicalAddressesArr = [];
  document.querySelectorAll('.phys-addr-input').forEach(i => {
    const v = i.value.trim(); if(v) physicalAddressesArr.push(v);
  });
  
  const licenseArr = [];
  document.querySelectorAll('input[name="license"]:checked').forEach(ch => licenseArr.push(ch.value));

  const payload = {
    userId: currentUser.id,
    nameOriginal: originalName,
    nameLatin: latinName,
    addressReg: regAddress,
    addressPhysical: physicalAddressesArr.join('; '),
    capital: capitalVal,
    sphere: industrySphere,
    staff: currentStaffTags.join(', '),
    licenses: licenseArr.join(', ')
  };

  if(!compId) {
    // New entity registration processing path
    payload.action = 'createCompany';
    payload.nameShort = shortCode;
    await apiCall(payload);
    showToast('Corporate filing processed successfully', 'success');
  } else {
    // Existing data file correction path
    payload.action = 'updateCompany';
    payload.companyId = compId;
    await apiCall({ action: 'updateCompany', userId: currentUser.id, companyId: compId, updates: payload });
    showToast('Filing system parameters written', 'success');
  }
  
  closeModal('modal-company');
  loadDashboardData();
}

async function deactivateCompanyRecord(id) {
  if(!confirm('Are you absolutely certain you want to flag this business registration file as legally inactive? This action cannot be undone.')) return;
  await apiCall({ action: 'deleteCompany', userId: currentUser.id, companyId: id });
  showToast('Company record file archived', 'success');
  loadDashboardData();
}

// ── ADMINISTRATIVE OPERATIONS SECTION ───────────────────────
function switchToAdmin() {
  const pass = prompt('Enter administrative master authorization key:');
  if(!pass) return;
  adminPasswordState = pass;
  navigateTo('screen-admin');
  switchAdminTab('comp');
}

function exitAdmin() {
  adminPasswordState = '';
  navigateTo('screen-auth');
}

function switchAdminTab(target) {
  document.getElementById('adm-tab-comp').classList.toggle('active', target === 'comp');
  document.getElementById('adm-tab-users').classList.toggle('active', target === 'users');
  document.getElementById('adm-panel-comp').style.display = target === 'comp' ? 'block' : 'none';
  document.getElementById('adm-panel-users').style.display = target === 'users' ? 'block' : 'none';
  
  if(target === 'comp') loadAdminCompanies();
  if(target === 'users') loadAdminUsers();
}

async function loadAdminCompanies() {
  const container = document.getElementById('admin-companies-container');
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
  try {
    const data = await apiCall({ action: 'adminGetAll', adminPassword: adminPasswordState });
    container.innerHTML = `
      <table style="width:100%; border-collapse:collapse; font-size:11px; margin-top:8px;">
        <thead>
          <tr style="border-bottom:1px solid var(--border); text-align:left;">
            <th style="padding:6px;">Code/Name</th>
            <th style="padding:6px;">Status</th>
            <th style="padding:6px; text-align:right;">Actions</th>
          </tr>
        </thead>
        <tbody>
          ${data.map(c => `
            <tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
              <td style="padding:8px var(--r);"><strong>[${escapeHtml(c.nameShort)}]</strong><br>${escapeHtml(c.nameLatin)}</td>
              <td style="padding:8px var(--r); color:${c.status === 'active' ? '#5ab87a' : '#e07070'}">${c.status}</td>
              <td style="padding:8px var(--r); text-align:right;">
                <button class="btn btn-danger btn-sm" style="padding:2px 6px; font-size:10px;" onclick="adminPurgeCompany('${c.id}')">Delete</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch(e) { container.innerHTML = ''; }
}

async function loadAdminUsers() {
  const container = document.getElementById('admin-users-container');
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
  try {
    const data = await apiCall({ action: 'adminGetUsers', adminPassword: adminPasswordState });
    container.innerHTML = `
      <table style="width:100%; border-collapse:collapse; font-size:11px; margin-top:8px;">
        <thead>
          <tr style="border-bottom:1px solid var(--border); text-align:left;">
            <th style="padding:6px;">User Handle</th>
            <th style="padding:6px;">Legal Profile Identity Name</th>
            <th style="padding:6px; text-align:right;">Actions</th>
          </tr>
        </thead>
        <tbody>
          ${data.map(u => `
            <tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
              <td style="padding:8px var(--r); font-family:var(--mono);">@${escapeHtml(u.username)}</td>
              <td style="padding:8px var(--r);">${escapeHtml(u.firstName)} ${escapeHtml(u.lastName)}</td>
              <td style="padding:8px var(--r); text-align:right;">
                <button class="btn btn-danger btn-sm" style="padding:2px 6px; font-size:10px;" onclick="adminEvictUser('${u.id}', '${u.username}')">Evict</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch(e) { container.innerHTML = ''; }
}

async function adminPurgeCompany(id) {
  if (!confirm('Hard erase this corporation configuration record profile data line forever from sheet?')) return;
  await apiCall({ action: 'adminDeleteCompany', adminPassword: adminPasswordState, companyId: id, hard: true });
  showToast('Record purged completely', 'success');
  loadAdminCompanies();
}

async function adminEvictUser(id, name) {
  if (!confirm(`Revoke and purge registration data file for user profile @${name}?`)) return;
  await apiCall({ action: 'adminDeleteUser', adminPassword: adminPasswordState, userId: id });
  showToast('Account record evicted', 'success');
  loadAdminUsers();
}

// ── POPUP STRUCTURAL LAYOUT COMPONENT HOOKS ───────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function handleOutsideModalClick(e, id) { if(e.target.id === id) closeModal(id); }

let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3500);
}

function escapeHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
